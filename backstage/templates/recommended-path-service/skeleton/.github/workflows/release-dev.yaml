name: release-dev

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      IMAGE_NAME: ${{ values.imageRegistry }}/${{ values.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install
      - run: npm run build

      - name: Set image tag
        id: image
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.image.output.tag }}
            ${{ env.IMAGE_NAME }}:main

      - name: Update dev manifest tag
        run: |
          sed -i "s/newTag: .*/newTag: ${{ steps.image.output.tag }}/" deploy/overlays/dev/kustomization.yaml

      - name: Commit manifest update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: promote dev image to ${{ steps.image.output.tag }}"
