apiVersion: v1
kind: Namespace
metadata:
  name: sample-service
  labels:
    app.kubernetes.io/name: sample-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-service
  namespace: sample-service
  labels:
    app.kubernetes.io/name: sample-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-service
    spec:
      containers:
        - name: app
          image: nginx:1.27.0
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
---
apiVersion: v1
kind: Service
metadata:
  name: sample-service
  namespace: sample-service
spec:
  selector:
    app.kubernetes.io/name: sample-service
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
